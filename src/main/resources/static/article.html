<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chi tiết bài báo</title>
    <link rel="stylesheet" href="main.css" />
  </head>
  <body>
    <header>
      <div class="container">
        <div class="header-top">
          <a href="index.html" class="logo">7news</a>
          <div class="search-bar"></div>
        </div>
        <nav>
          <ul>
            <li><a href="index.html">Trang chủ</a></li>
            <li><a href="index.html">Chính trị</a></li>
            <li><a href="index.html">Pháp luật</a></li>
            <li><a href="index.html">Giáo dục</a></li>
            <li><a href="index.html">Kinh doanh</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <div class="container content-wrapper">
      <main class="article-detail" id="articleDetail" style="display:none;">
        <div class="breadcrumb">
          <a href="index.html">Trang chủ</a> >
          <a href="#" id="breadCategory">Đang tải</a>
        </div>

        <h1 id="articleTitle">Đang tải tiêu đề...</h1>

        <div class="article-info">
          <span id="articleDate">Đang cập nhật</span>
        </div>

        <p class="article-sapo" id="articleDesc">
          Đang tải tóm tắt...
        </p>

        <div class="article-content" id="articleBody">
           <!-- Render content từ JS -->
        </div>

        <div class="article-author" id="articleAuthor"></div>
      </main>
      
      <div id="loading" style="text-align:center; padding: 50px;">Đang tải nội dung...</div>

      <aside class="sidebar">
        <h2>Bài báo gợi ý</h2>
        <ul class="trending-list" id="sidebarRelated">
          <!-- Gợi ý ngẫu nhiên -->
        </ul>
        <div class="ad-banner" style="margin-top: 40px">
          <p>Vị trí đặt Banner Quảng cáo (300x600)</p>
        </div>
      </aside>
    </div>

    <footer>
      <p>&copy; 2026 7news. Bản quyền thuộc về sinh viên thực hiện.</p>
    </footer>

    <script>
      const urlParams = new URLSearchParams(window.location.search);
      const id = urlParams.get("id");
      
      if(id) {
          fetch("/api/articles/" + id)
          .then(res => res.json())
          .then(data => {
              document.getElementById("loading").style.display = "none";
              document.getElementById("articleDetail").style.display = "block";
              
              document.title = data.title + " - 7news";
              document.getElementById("breadCategory").innerText = data.category;
              document.getElementById("articleTitle").innerText = data.title;
              document.getElementById("articleDesc").innerText = data.description;
              
              // Format time if existing
              if (data.crawledAt) {
                  const dateObj = new Date(data.crawledAt);
                  document.getElementById("articleDate").innerText = "Ngày cào: " + dateObj.toLocaleString("vi-VN");
              }

              let contentHtml = "";
              if (data.imageUrl) {
                  contentHtml += `<img src="${data.imageUrl}" alt="${data.title}" style="width:100%; border-radius:4px; margin: 20px 0;"/>`;
              }
              
              if (data.content) {
                  const paras = data.content.split("\n\n");
                  paras.forEach(p => {
                      contentHtml += `<p>${p}</p>`;
                  });
              }
              
              document.getElementById("articleBody").innerHTML = contentHtml;
              document.getElementById("articleAuthor").innerHTML = `Nguồn: <a href="${data.url}" target="_blank">${data.url}</a>`;
          })
          .catch(err => {
              document.getElementById("loading").innerText = "Lỗi khi tải bài báo!";
          });

          // Fetch random recommendations
          fetch("/api/articles")
          .then(res => res.json())
          .then(list => {
              let html = "";
              for(let i = 0; i < Math.min(5, list.length); i++) {
                 html += `<li><a href="article.html?id=${list[i].id}" style="text-decoration:none; color:inherit;">${i+1}. ${list[i].title}</a></li>`;
              }
              document.getElementById("sidebarRelated").innerHTML = html;
          });
      }
    </script>
  </body>
</html>
